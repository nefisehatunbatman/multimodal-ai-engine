services:
  # -------------------------
  # AI Engine Postgres
  # -------------------------
  postgres:
    container_name: postgres_db
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # FastAPI AI Engine
  # -------------------------
  ai_engine:
    build: .
    container_name: ai_engine
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
      WEKNORA_APP_HOST: WeKnora-app
      WEKNORA_APP_PORT: 8080
    ports:
      - "8001:8000"
    restart: unless-stopped
    networks:
      - default
      - weknora_WeKnora-network

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
  weknora_WeKnora-network:
    external: true